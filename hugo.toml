baseURL = "https://ybht.vercel.app"
title = "Petrel's Domain"
theme = "hugo-coder"
languageCode = "en"
defaultContentLanguage = "en"
enableEmoji = true

[pagination]
pagerSize = 20

[markup]
[markup.highlight]
noClasses = false

[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

[params]
author = "Petrel"
description = "我的个人博客"
keywords = "博客,技术,生活"
info = ["学习者", "记录者"]
avatarURL = "images/avatar.jpg"
dateFormat = "2006-01-02"
since = 2025
colorScheme = "auto"
hideColorSchemeToggle = false
maxSeeAlsoItems = 5

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

# 菜单配置
[[menu.main]]
name = "文章"
weight = 2
url = "posts/"

[[menu.main]]
name = "关于"
weight = 1
url = "about/"

# 社交链接
[[params.social]]
name = "Github"
icon = "fa-brands fa-github fa-2x"
weight = 1
url = "https://github.com/Petrel0900/"

